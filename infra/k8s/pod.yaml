apiVersion: v1
kind: Pod
metadata:
  name: runner-{replId}
  labels:
    app: runner
    replId: "{replId}"
spec:
  restartPolicy: Never
  initContainers:
    - name: s3-sync
      image: amazon/aws-cli:latest
      command:
        - "sh"
        - "-c"
        - "aws s3 cp s3://{s3Path} /workspace/ --recursive"
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: secret-key
        - name: AWS_ENDPOINT_URL
          value: "http://host.docker.internal:9000"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  containers:
    - name: runner
      image: bucketcode/runner-{language}:v1
      imagePullPolicy: Never
      env:
        - name: REPL_ID
          value: "{replId}"
        - name: S3_PATH
          value: "{s3Path}"
      ports:
        - containerPort: 3001
          name: ws
        - containerPort: 3000
          name: preview
      resources:
        requests:
          cpu: "0.5"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      emptyDir: {}
