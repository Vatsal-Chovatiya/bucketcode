# =============================================================================
# BucketCode — Orchestrator Deployment & Service
# =============================================================================
# The orchestrator manages the Kubernetes lifecycle of runner pods.
# It creates/destroys Pod+Service+Ingress per repl and watches for idle pods.
#
# For local development with Docker Desktop K8s:
#   kubectl apply -f infra/k8s/base/orchestrator-deployment.yaml
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: orchestrator
    app.kubernetes.io/part-of: bucketcode
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      # The orchestrator needs elevated permissions to manage pods/services/ingresses
      serviceAccountName: default
      containers:
        - name: orchestrator
          image: bucketcode/orchestrator:v1
          imagePullPolicy: Never  # Use local Docker images (Docker Desktop K8s)
          ports:
            - containerPort: 3003
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: ORCHESTRATOR_PORT
              value: "3003"
            - name: K8S_NAMESPACE
              value: "default"
            - name: TEMPLATES_DIR
              value: "/app/infra/k8s"
            - name: PREVIEW_DOMAIN
              value: "localtest.me"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
                  optional: true
            - name: WATCHER_INTERVAL_MS
              value: "5000"
            - name: CLEANUP_INTERVAL_MS
              value: "60000"
            - name: IDLE_TIMEOUT_MS
              value: "300000"   # 5 minutes
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8082        # External-facing port (mapped from container 3003)
      targetPort: 3003
      protocol: TCP
