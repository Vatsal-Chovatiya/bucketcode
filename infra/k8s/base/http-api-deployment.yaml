# =============================================================================
# BucketCode — HTTP API Deployment & Service
# =============================================================================
# The HTTP API handles REST endpoints for repl CRUD (create, list, delete).
# Runs on port 3001 internally, exposed via ClusterIP Service.
#
# For local development with Docker Desktop K8s:
#   kubectl apply -f infra/k8s/base/http-api-deployment.yaml
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-api
  labels:
    app: http-api
    app.kubernetes.io/part-of: bucketcode
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-api
  template:
    metadata:
      labels:
        app: http-api
    spec:
      containers:
        - name: http-api
          image: bucketcode/http-api:v1
          imagePullPolicy: Never  # Use local Docker images (Docker Desktop K8s)
          ports:
            - containerPort: 3001
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
                  optional: true
            - name: S3_ENDPOINT
              value: "http://host.docker.internal:9000"
            - name: S3_BUCKET
              value: "bucketcode-repls"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: secret-key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: http-api
  labels:
    app: http-api
spec:
  type: ClusterIP
  selector:
    app: http-api
  ports:
    - name: http
      port: 8080        # External-facing port (mapped from container 3001)
      targetPort: 3001
      protocol: TCP
